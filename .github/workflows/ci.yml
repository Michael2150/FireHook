name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      firebird:
        image: jacobalberty/firebird:4.0
        env:
          ISC_PASSWORD: masterkey
        ports:
          - 3050:3050
        options: >-
          --health-cmd "nc -z localhost 3050"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Wait for Firebird
        run: |
          for i in $(seq 1 30); do
            nc -z localhost 3050 && break
            sleep 2
          done

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        env:
          FIREHOOK_TEST_DB_DIR: /firebird/data
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"
